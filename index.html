<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoLab - Make It Happen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>

    <main class="app">
        <header class="app-header">
            <div class="brand">
                <span class="brand__chip">TodoLab</span>
                <h1 class="app-title">Make your day feel lighter.</h1>
                <p class="app-subtitle">Capture, focus, and finish with a calm, gorgeous checklist.</p>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" type="button" aria-label="Toggle theme">
                    <span class="theme-toggle__icon" aria-hidden="true"></span>
                    <span class="theme-toggle__label">Theme</span>
                </button>
            </div>
        </header>

        <section class="composer">
            <form class="formselect" autocomplete="off">
                <input autofocus type="text" class="inputselect" placeholder="Add a task like: 20-min workout" />
                <button class="add-btn" type="submit">Add Task</button>
            </form>
        </section>

        <section class="meta">
            <div class="stats">
                <span class="stat"><strong data-count="total">0</strong> total</span>
                <span class="stat"><strong data-count="active">0</strong> active</span>
                <span class="stat"><strong data-count="done">0</strong> done</span>
            </div>
            <div class="filters">
                <button class="filter-btn js-filter is-active" data-filter="all" type="button">All</button>
                <button class="filter-btn js-filter" data-filter="active" type="button">Active</button>
                <button class="filter-btn js-filter" data-filter="done" type="button">Done</button>
            </div>
            <button class="clear-btn js-clear-completed" type="button">Clear done</button>
        </section>

        <ul class="todo-list js-todo-list"></ul>

        <div class="empty-state" aria-live="polite">
            <div class="empty-illustration" aria-hidden="true">
                <svg viewBox="0 0 128 128" role="img">
                    <defs>
                        <linearGradient id="todoGlow" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#ff7a59" />
                            <stop offset="100%" stop-color="#ffb347" />
                        </linearGradient>
                    </defs>
                    <circle cx="64" cy="64" r="54" fill="url(#todoGlow)" opacity="0.12" />
                    <rect x="34" y="34" width="60" height="64" rx="12" fill="#ffffff" opacity="0.9" />
                    <rect x="42" y="48" width="44" height="8" rx="4" fill="#ff7a59" />
                    <rect x="42" y="64" width="32" height="8" rx="4" fill="#f0d6c9" />
                    <rect x="42" y="80" width="28" height="8" rx="4" fill="#f0d6c9" />
                </svg>
            </div>
            <h2 class="empty-state__title">Your list is clear.</h2>
            <p class="empty-state__description">Add your first task and press Enter to launch your flow.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
